// Remove all existing binds.
unbindall

// Updates game keyboard layout to the current Windows keyboard setting.
key_updatelayout

// Slot binds.
bind "1"             "slot1"                                                                                  // Slot 1
bind "2"             "slot2"                                                                                  // Slot 2
bind "3"             "slot3"                                                                                  // Slot 3
bind "4"             "slot4"                                                                                  // Slot 4
bind "5"             "slot5"                                                                                  // Slot 5
bind "6"             "slot6"                                                                                  // Slot 6
bind "7"             "slot7"                                                                                  // Slot 7
bind "8"             "slot8"                                                                                  // Slot 8
bind "9"             "slot9"                                                                                  // Slot 9
bind "0"             ""                                                                                       // -

// Movement binds.
bind "w"             "+forward"                                                                               // Move forward.
bind "a"             "+moveleft"                                                                              // Strafe left.
bind "s"             "+back"                                                                                  // Move back.
bind "d"             "+moveright"                                                                             // Strafe right.

// Other letter keys.
bind "c"             ""                                                                                       // -
bind "b"             "mom_start_mark_set"                                                                     // Set start mark
bind "e"             "+use"                                                                                   // -
bind "f"             ""                                                                                       // -
bind "g"             ""                                                                                       // -
bind "h"             ""                                                                                       // -
bind "i"             "hud_menu_show savestate"                                                                // Show savestate hud.
bind "j"             ""                                                                                       // -
bind "k"             ""                                                                                       // -
bind "l"             ""                                                                                       // -
bind "m"             "mom_stop_timer"                                                                         // Stop the timer.
bind "n"             "mom_start_mark_clear"                                                                   // Reset start mark
bind "o"             "hud_menu_show climbtp"                                                                  // Show climb tp hud.
bind "p"             "hud_menu_show mapcmds"                                                                  // Show map command hud.
bind "q"             "lastinv"                                                                                // Switch to last equipped weapon.
bind "r"             "mom_restart_stage"                                                                      // Restart stage.
bind "t"             "mom_restart_track"                                                                      // Restart track.
bind "u"             "hud_menu_show painthud"                                                                 // Open paint hud.
bind "v"             "noclip"                                                                                 // noclip
bind "y"             "chat_open"                                                                              // Open chat.
bind "z"             "hud_menu_show ruler"                                                                    // Open ruler hud.

// Special keys.
bind "escape"        "cancelselect"                                                                           // Open / close the game menu.
bind "tab"           "+showtimes"                                                                             // Shows the scoreboard.
bind "capslock"      ""                                                                                       // -
bind "shift"         "+speed"                                                                                 // Walk.
bind "rshift"        ""                                                                                       // -
bind "ctrl"          "+duck"                                                                                  // Duck / Crouch.
bind "rctrl"         ""                                                                                       // -
bind "alt"           ""                                                                                       // -
bind "ralt"          ""                                                                                       // -
bind "space"         "+jb"                                                                                    // -
bind "enter"         "chat_open"                                                                              // Open chat.
bind "backspace"     ""                                                                                       // -
bind "ins"           ""                                                                                       // -
bind "del"           ""                                                                                       // -
bind "home"          ""                                                                                       // -
bind "end"           ""                                                                                       // -
bind "pgup"          "exec nem/audio.cfg"                                                                     // Execute default audio settings (revert the sound).
bind "pgdn"          "volume 0"                                                                               // Mute the sound.
bind "scrolllock"    ""                                                                                       // -

// Punctuation keys.
bind "`"             "toggleconsole"                                                                          // Open the developer console.
bind ","             ""                                                                                       // -
bind "."             ""                                                                                       // -
bind "/"             ""                                                                                       // -
bind "semicolon"     ""                                                                                       // -
bind "'"             ""                                                                                       // -
bind "\"             ""                                                                                       // -
bind "["             ""                                                                                       // -
bind "]"             ""                                                                                       // -
bind "-"             ""                                                                                       // -
bind "="             ""                                                                                       // -

// Cursor control keys.
bind "uparrow"       "+forward"                                                                               // Move forward.
bind "downarrow"     "+back"                                                                                  // Move back.
bind "leftarrow"     "+left"                                                                                  // Rotate to the left
bind "rightarrow"    "+right"                                                                                 // Rotate to the right

// Mouse keys.
bind "mwheelup"      "+jump"                                                                                  // -
bind "mwheeldown"    "+jump"                                                                                  // -
bind "mouse1"        "+attack"                                                                                // -
bind "mouse2"        "+attack2"                                                                               // -
bind "mouse3"        ""                                                                                       // -
bind "mouse4"        "+lj"                                                                                    // -
bind "mouse5"        "mom_climb_checkpoint_set"                                                               // Create savestate (climb)

// Function keys.
bind "f1"            ""                                                                                       // -
bind "f2"            ""                                                                                       // -
bind "f3"            "askconnect_accept"                                                                      // Accept a redirect request by the server.
bind "f4"            ""                                                                                       // -
bind "f5"            ""                                                                                       // -
bind "f6"            ""                                                                                       // -
bind "f7"            ""                                                                                       // -
bind "f8"            ""                                                                                       // -
bind "f9"            ""                                                                                       // -
bind "f10"           ""                                                                                       // -
bind "f11"           ""                                                                                       // -
bind "f12"           ""                                                                                       // -

// Numeric keypad keys.
bind "numlock"        ""                                                                                      // -
bind "kp_multiply"    ""                                                                                      // -
bind "kp_minus"       ""                                                                                      // -
bind "kp_plus"        ""                                                                                      // -
bind "kp_enter"       ""                                                                                      // -
bind "kp_del"         ""                                                                                      // -
bind "kp_ins"         ""                                                                                      // -
bind "kp_end"         ""                                                                                      // -
bind "kp_downarrow"   ""                                                                                      // -
bind "kp_pgdn"        ""                                                                                      // -
bind "kp_leftarrow"   ""                                                                                      // -
bind "kp_5"           ""                                                                                      // -
bind "kp_rightarrow"  ""                                                                                      // -
bind "kp_home"        ""                                                                                      // -
bind "kp_uparrow"     ""                                                                                      // -
bind "kp_pgup"        ""                                                                                      // -

// Duck toggle.
// Default: 0
//
// <> Values:
// 0: Hold to duck.
// 1: Press to toggle duck.
option_duck_method "0"

// Walk toggle.
// Default: 0
//
// <> Values:
// 0: Hold to walk.
// 1: Press to toggle walk.
option_speed_method "0"