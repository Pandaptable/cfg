// Remove all existing binds.
unbindall

// Updates game keyboard layout to the current Windows keyboard setting.
key_updatelayout

// Slot binds.
bind "1"             "slot1"                                                                                  // Slot 1
bind "2"             "slot2"                                                                                  // Slot 2
bind "3"             "slot3; +lookatweapon; -lookatweapon"                                                    // Slot 3
bind "4"             "slot4; +lookatweapon; -lookatweapon"                                                    // Slot 4
bind "5"             "slot5; +lookatweapon; -lookatweapon"                                                    // Slot 5
bind "6"             "slot9; +lookatweapon; -lookatweapon"                                                    // Decoy Grenade.
bind "7"             "slot11; +lookatweapon; -lookatweapon"                                                   // Zeus
bind "8"             "slot12"                                                                                 // Medi-Shot
bind "9"             ""                                                                                       // -
bind "0"             "callvote starttimeout"                                                                  // Start timeout

// Movement binds.
bind "w"             "+forward;   keycontainer"                                                               // Move forward.
bind "a"             "+moveleft;  keycontainer"                                                               // Strafe left.
bind "s"             "+back;      keycontainer"                                                               // Move back.
bind "d"             "+moveright"                                                                             // Strafe right.


// Chat binds.
bind "u"             "messagemode2"                                                                           // Team messages (chat only with the team).
bind "y"             "messagemode"                                                                            // Broadcast and Team messages (chat with all).


// Other letter keys.
bind "b"             "buymenu"                                                                                // Open the buy menu.
bind "c"             "toggle cl_righthand"                                                                    // swap hands
bind "e"             "+betteruse"                                                                             // Execute actions
bind "f"             "+lookatweapon"                                                                          // Inspect the weapon.
bind "g"             "drop"                                                                                   // Drop the current weapon.
bind "h"             ""                                                                                       // -
bind "i"             ""                                                                                       // -
bind "j"             ""                                                                                       // -
bind "k"             "callvote"                                                                               // Open the vote menu.
bind "l"             "say !case cs:go weapon case"                                                            // :3
bind "m"             "teammenu"                                                                               // Open the team selection menu.
bind "n"             ""                                                                                       // -
bind "o"             "shootr_toggle"                                                                          // Toggle better follow recoil bind (disables when you let go of mouse1)
bind "p"             "toggle spec_show_xray"                                                                  // Toggles x-ray when spectating.
bind "q"             "+quickswitch"                                                                           // Switch to knife while holding, then switch back after letting go.
bind "r"             "+reload"                                                                                // Reload the currently weapon.
bind "t"             "+spray_menu"                                                                            // Open the spray menu to apply spray on the aimed surface.
bind "v"             "nc"                                                                                     // Noclip
bind "x"             "say !〈͜͡˒ ⋊; keycontainer"                                                                // -
bind "z"             ""                                                                                       // -


// Special keys.
bind "escape"        "cancelselect"                                                                           // Open / close the game menu.
bind "tab"           "+showscores"                                                                            // Shows the scoreboard
bind "capslock"      ""                                                                                       // -
bind "shift"         "+speed"                                                                                 // Walk.
bind "rshift"        ""                                                                                       // -
bind "ctrl"          "+duck"                                                                                  // Duck / Crouch.
bind "rctrl"         ""                                                                                       // -
bind "alt"           ""                                                                                       // -
bind "ralt"          ""                                                                                       // -
bind "space"         "+jb"                                                                                    // Jump bug bind.
bind "enter"         ""                                                                                       // -
bind "backspace"     ""                                                                                       // -
bind "ins"           ""                                                                                       // -
bind "del"           ""                                                                                       // -
bind "home"          ""                                                                                       // -
bind "end"           ""                                                                                       // -
bind "pgup"          "exec settings/audio.cfg"                                                                // Execute default audio settings (revert the sound).
bind "pgdn"          "volume 0"                                                                               // Mute the sound.
bind "scrolllock"    ""                                                                                       // -

// Punctuation keys.
bind "`"             "toggleconsole"                                                                          // Open the developer console.
bind ","             "exec autoexec"                                                                          // Execute the autoexec.cfg.
bind "."             ""                                                                                       // -
bind "/"             ""                                                                                       // -
bind "semicolon"     "say !case random; keycontainer"                                                         // :3
bind "'"             ""                                                                                       // -
bind "\"             ""                                                                                       // -
bind "["             ""                                                                                       // -
bind "]"             ""                                                                                       // -
bind "-"             ""                                                                                       // -
bind "="             ""                                                                                       // -

// Cursor control keys.
bind "uparrow"       "+forward"                                                                               // Move forward.
bind "downarrow"     "+back"                                                                                  // Move back.
bind "leftarrow"     "+turnleft"                                                                              // Rotate to the left
bind "rightarrow"    "+turnright"                                                                             // Rotate to the right

// Mouse keys.
bind "mwheelup"      "+jump"                                                                                  // Jump
bind "mwheeldown"    "+jump"                                                                                  // Jump
bind "mouse1"        "+shootr"                                                                                // -
bind "mouse2"        "+attack2"                                                                               // -
bind "mouse3"        "player_ping"                                                                            // Ping
bind "mouse4"        "+lj"                                                                                    // Long jump
bind "mouse5"        "+voicerecord"                                                                           // Voice Comms

// Function keys.
bind "f1"            ""                                                                                       // -
bind "f2"            ""                                                                                       // -
bind "f3"            "togglehud"                                                                              // Toggles hud and only draws death notices
bind "f4"            "afk-move"                                                                               // AFK script toggle
bind "f5"            "togglethirdperson"                                                                      // hehe funny minecraft
bind "f6"            ""                                                                                       // -
bind "f7"            ""                                                                                       // -
bind "f8"            ""                                                                                       // -
bind "f9"            ""                                                                                       // -
bind "f10"           ""                                                                                       // -
bind "f11"           ""                                                                                       // -
bind "f12"           ""                                                                                       // -

// Numeric keypad keys.
bind "numlock"        ""                                                                                      // -
bind "kp_slash"       ""                                                                                      // -
bind "kp_multiply"    ""                                                                                      // -
bind "kp_minus"       ""                                                                                      // -
bind "kp_plus"        ""                                                                                      // -
bind "kp_enter"       "exec prac"                                                                             // practice cfg
bind "kp_del"         ""                                                                                      // -
bind "kp_ins"         ""                                                                                      // -
bind "kp_end"         ""                                                                                      // -
bind "kp_downarrow"   ""                                                                                      // -
bind "kp_pgdn"        ""                                                                                      // -
bind "kp_leftarrow"   ""                                                                                      // -
bind "kp_5"           ""                                                                                      // -
bind "kp_rightarrow"  ""                                                                                      // -
bind "kp_home"        ""                                                                                      // -
bind "kp_uparrow"     ""                                                                                      // -
bind "kp_pgup"        ""                                                                                      // -

// Prevent buy wheel from purchasing via number keys.
// Default: 0
cl_buywheel_nonumberpurchasing "1"

// Pressing the +use key will open the buy menu if in a buy zone (just as if the 'buy' key is pressed).
// Default: 1
cl_use_opens_buy_menu "0"

// Name of the binding to enable mouse selection in the scoreboard.
// Default: +attack2
cl_scoreboard_mouse_enable_binding "+attack2"

// Set the key to use for donation in the buy menu.
// Default: 0
//
// <> Values:
// 0: Left Control.
// 1: Left Alt.
// 2: Left Shift.
cl_buywheel_donate_key "0"

// Duck toggle.
// Default: 0
//
// <> Values:
// 0: Hold to duck.
// 1: Press to toggle duck.
option_duck_method "0"

// Walk toggle.
// Default: 0
//
// <> Values:
// 0: Hold to walk.
// 1: Press to toggle walk.
option_speed_method "0"

// When tapping the radial radio button, leave a ping if nothing is selected within the time in seconds set in 'cl_radial_menu_tap_duration'.
// Default: 1
cl_radial_radio_tap_to_ping "1"

// Joystick controller support.
// Default: 0
joystick "0"